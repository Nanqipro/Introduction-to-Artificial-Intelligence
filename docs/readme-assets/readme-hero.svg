    <text x="81" y="31" text-anchor="middle" fill="#27331d">Vue 3 + Vite</text>
    <rect x="178" width="176" height="48" rx="14" fill="#d8f6e4"/>
    <text x="266" y="31" text-anchor="middle" fill="#174b39">Spring Boot</text>
    <rect x="370" width="146" height="48" rx="14" fill="#9fd8ff"/>
    <text x="443" y="31" text-anchor="middle" fill="#16354b">MySQL 8</text>

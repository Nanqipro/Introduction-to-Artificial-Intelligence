<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="560" viewBox="0 0 1440 560" role="img" aria-labelledby="title desc">
  <title id="title">《人工智能概论》数字化教材平台</title>
  <desc id="desc">深绿色教材主题横幅，介绍2025年出版的应用驱动人工智能数字化教材</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071d18"/>
      <stop offset="0.55" stop-color="#123d31"/>
      <stop offset="1" stop-color="#205a45"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#a9e7c5" stop-opacity=".45"/>
      <stop offset="1" stop-color="#a9e7c5" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#d6f5e3" stroke-opacity=".08"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#00110d" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="1440" height="560" rx="28" fill="url(#bg)"/>
  <rect width="1440" height="560" rx="28" fill="url(#grid)"/>
  <circle cx="1240" cy="74" r="270" fill="url(#glow)"/>
  <circle cx="1120" cy="480" r="190" fill="none" stroke="#c8f3d9" stroke-opacity=".18" stroke-width="2"/>
  <circle cx="1120" cy="480" r="130" fill="none" stroke="#c8f3d9" stroke-opacity=".18" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="86" y="70" width="238" height="42" rx="21" fill="#d8f6e4"/>
    <text x="205" y="98" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#174b39">2025 · 数字化教材</text>
  </g>
  <text x="86" y="218" font-family="system-ui, 'Noto Sans SC', sans-serif" font-size="78" font-weight="800" letter-spacing="3" fill="#f5fff8">人工智能概论</text>
  <text x="90" y="282" font-family="system-ui, 'Noto Sans SC', sans-serif" font-size="31" font-weight="600" fill="#bdeacf">应用驱动的人工智能 · 从纸质教材走向交互学习</text>
  <text x="90" y="343" font-family="system-ui, 'Noto Sans SC', sans-serif" font-size="22" fill="#e0f6e9">章节导学 · 可视化实验 · 知识测验 · 学习进度</text>
  <g transform="translate(90 406)" font-family="system-ui, sans-serif" font-size="17" font-weight="700">
